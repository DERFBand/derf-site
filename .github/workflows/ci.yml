name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run seed initialization script
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci.db
          MEDIA_ROOT: ./media
          STATIC_ROOT: ./static
        run: python seed_default_data.py

      - name: Run backend tests
        run: pytest -q

  backend-smoke:
    name: Backend smoke checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run seed initialization script
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci-smoke.db
          MEDIA_ROOT: ./media
          STATIC_ROOT: ./static
        run: python seed_default_data.py

      - name: Run backend smoke checks
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci-smoke.db
          MEDIA_ROOT: ./media
          STATIC_ROOT: ./static
        run: python smoke_test.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage -- --runInBand

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
